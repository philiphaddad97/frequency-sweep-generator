<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frequency Sweep Generator</title>
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<script src="lame.min.js"></script>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel-2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent-2: #22d3ee;
    --danger: #f87171;
    --ok: #4ade80;
    --border: #334155;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .container {
    max-width: 880px;
    margin: 0 auto;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  .logo {
    width: clamp(56px, 12vw, 72px);
    height: clamp(56px, 12vw, 72px);
    display: block;
    margin: 0 auto 10px;
    border-radius: 16px;
    box-shadow: 0 6px 24px rgba(56, 189, 248, 0.35);
  }
  h1 {
    margin: 0 0 6px;
    font-size: clamp(20px, 5vw, 28px);
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  header p {
    margin: 0;
    color: var(--muted);
    font-size: clamp(12px, 3vw, 14px);
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: clamp(14px, 3vw, 20px);
    margin-bottom: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 220px), 1fr));
    gap: 14px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  label {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input[type="number"], select {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 12px 12px;
    font-size: 16px; /* 16px prevents iOS auto-zoom on focus */
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
    min-height: 44px; /* iOS touch target */
  }
  input[type="number"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 8px;
    background: var(--panel-2);
    border-radius: 4px;
    outline: none;
    padding: 0;
    margin: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--panel);
  }
  input[type="range"]::-moz-range-thumb {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 3px solid var(--panel);
  }
  .slider-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .slider-value {
    min-width: 38px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    color: var(--accent);
    font-weight: 600;
  }
  .checkbox {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
  }
  .checkbox input { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
  }
  button {
    flex: 1 1 140px;
    min-height: 48px;
    padding: 14px 18px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.05s, opacity 0.15s, background 0.15s;
    font-family: inherit;
    touch-action: manipulation;
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-play {
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #0f172a;
  }
  .btn-play:hover:not(:disabled) { filter: brightness(1.1); }
  .btn-stop {
    background: var(--panel-2);
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .btn-stop:hover:not(:disabled) { background: rgba(248, 113, 113, 0.1); }
  .btn-download {
    background: var(--panel-2);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-download:hover:not(:disabled) { background: rgba(56, 189, 248, 0.1); }
  .btn-mp3 {
    background: var(--panel-2);
    color: var(--ok);
    border: 1px solid var(--ok);
  }
  .btn-mp3:hover:not(:disabled) { background: rgba(74, 222, 128, 0.1); }
  .status {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 10px;
    margin-top: 16px;
  }
  .stat {
    background: var(--panel-2);
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: clamp(18px, 4.5vw, 22px);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--accent);
  }
  .stat-unit { font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 2px; }
  .indicator {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 8px;
    vertical-align: middle;
  }
  .indicator.active { background: var(--ok); box-shadow: 0 0 8px var(--ok); animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-text { font-size: 14px; color: var(--muted); }
  .progress {
    width: 100%;
    height: 6px;
    background: var(--panel-2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 12px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    width: 0%;
    transition: width 0.1s linear;
  }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    margin-top: 20px;
  }
  footer .links {
    margin-bottom: 8px;
  }
  footer .links a {
    color: var(--muted);
    text-decoration: none;
    margin: 0 8px;
  }
  footer .links a:hover { color: var(--accent); }
</style>
</head>
<body>
  <div class="container">
    <header>
      <img src="logo.svg" alt="" class="logo" />
      <h1>Frequency Sweep Generator</h1>
      <p>Web Audio API tone sweep — sine, square, sawtooth, triangle</p>
    </header>

    <div class="panel">
      <div class="grid">
        <div class="field">
          <label for="startFreq">Start Frequency (Hz)</label>
          <input type="number" id="startFreq" value="20" min="1" max="22000" step="1" />
        </div>
        <div class="field">
          <label for="endFreq">End Frequency (Hz)</label>
          <input type="number" id="endFreq" value="20000" min="1" max="22000" step="1" />
        </div>
        <div class="field">
          <label for="duration">Duration (seconds)</label>
          <input type="number" id="duration" value="4" min="0.1" max="600" step="0.1" />
        </div>
        <div class="field">
          <label for="waveform">Waveform</label>
          <select id="waveform">
            <option value="sine">Sine</option>
            <option value="square">Square</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="triangle">Triangle</option>
          </select>
        </div>
        <div class="field">
          <label for="sweepType">Sweep Type</label>
          <select id="sweepType">
            <option value="linear">Linear</option>
            <option value="exponential" selected>Exponential (Logarithmic)</option>
          </select>
        </div>
        <div class="field">
          <label for="startVol">Start Volume</label>
          <div class="slider-row">
            <input type="range" id="startVol" value="50" min="1" max="100" step="1" />
            <span class="slider-value" id="startVolDisplay">50</span>
          </div>
        </div>
        <div class="field">
          <label for="endVol">End Volume</label>
          <div class="slider-row">
            <input type="range" id="endVol" value="50" min="1" max="100" step="1" />
            <span class="slider-value" id="endVolDisplay">50</span>
          </div>
        </div>
        <div class="field" style="justify-content: flex-end;">
          <label class="checkbox">
            <input type="checkbox" id="continueAfter" />
            <span>Continue playing end frequency after sweep</span>
          </label>
        </div>
      </div>

      <div class="buttons">
        <button class="btn-play" id="playBtn">▶ Play</button>
        <button class="btn-stop" id="stopBtn" disabled>■ Stop</button>
        <button class="btn-download" id="downloadBtn">⬇ WAV</button>
        <button class="btn-mp3" id="downloadMp3Btn">⬇ MP3</button>
      </div>

      <div class="progress"><div class="progress-bar" id="progressBar"></div></div>

      <div style="margin-top: 14px;">
        <span class="indicator" id="indicator"></span>
        <span class="status-text" id="statusText">Ready</span>
      </div>

      <div class="status">
        <div class="stat">
          <div class="stat-label">Current Frequency</div>
          <div class="stat-value"><span id="curFreq">0</span><span class="stat-unit"> Hz</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Elapsed Time</div>
          <div class="stat-value"><span id="curTime">0.0</span><span class="stat-unit"> s</span></div>
        </div>
        <div class="stat">
          <div class="stat-label">Current Volume</div>
          <div class="stat-value"><span id="curVol">0</span><span class="stat-unit"> %</span></div>
        </div>
      </div>
    </div>

    <footer>
      <div class="links">
        <a href="/about">About</a> ·
        <a href="/terms">Terms</a> ·
        <a href="/privacy">Privacy</a> ·
        <a href="/contact">Contact</a>
      </div>
      Use a quality audio output. Keep volume low when testing — sweeps can be loud at resonant frequencies.
    </footer>
  </div>

<script>
(() => {
  const $ = id => document.getElementById(id);

  const startFreqEl = $('startFreq');
  const endFreqEl = $('endFreq');
  const durationEl = $('duration');
  const waveformEl = $('waveform');
  const sweepTypeEl = $('sweepType');
  const startVolEl = $('startVol');
  const endVolEl = $('endVol');
  const startVolDisplay = $('startVolDisplay');
  const endVolDisplay = $('endVolDisplay');
  const continueAfterEl = $('continueAfter');
  const playBtn = $('playBtn');
  const stopBtn = $('stopBtn');
  const indicator = $('indicator');
  const statusText = $('statusText');
  const curFreqEl = $('curFreq');
  const curTimeEl = $('curTime');
  const curVolEl = $('curVol');
  const progressBar = $('progressBar');

  startVolEl.addEventListener('input', () => startVolDisplay.textContent = startVolEl.value);
  endVolEl.addEventListener('input', () => endVolDisplay.textContent = endVolEl.value);

  let audioCtx = null;
  let oscillator = null;
  let gainNode = null;
  let startTime = 0;
  let rafId = null;
  let sweepDuration = 0;
  let continueAfter = false;
  let params = null;

  function volToGain(v) {
    // Convert 1-100 scale to gain. Square law gives a more natural loudness curve.
    const n = Math.max(0, Math.min(100, v)) / 100;
    return n * n * 0.5; // cap at 0.5 to leave headroom
  }

  function currentSweepFrequency(t, p) {
    if (t <= 0) return p.startFreq;
    if (t >= p.duration) return p.endFreq;
    const ratio = t / p.duration;
    if (p.sweepType === 'exponential' && p.startFreq > 0 && p.endFreq > 0) {
      return p.startFreq * Math.pow(p.endFreq / p.startFreq, ratio);
    }
    return p.startFreq + (p.endFreq - p.startFreq) * ratio;
  }

  function currentVolume(t, p) {
    if (t <= 0) return p.startVol;
    if (t >= p.duration) return p.endVol;
    const ratio = t / p.duration;
    return p.startVol + (p.endVol - p.startVol) * ratio;
  }

  function tick() {
    if (!audioCtx || !params) return;
    const elapsed = audioCtx.currentTime - startTime;
    const inSweep = elapsed < sweepDuration;
    const t = Math.min(elapsed, sweepDuration);

    const freq = currentSweepFrequency(t, params);
    const vol = inSweep ? currentVolume(t, params) : params.endVol;
    const progress = Math.min(100, (elapsed / sweepDuration) * 100);

    curFreqEl.textContent = freq < 100 ? freq.toFixed(2) : freq.toFixed(0);
    curTimeEl.textContent = elapsed.toFixed(1);
    curVolEl.textContent = Math.round(vol);
    progressBar.style.width = progress + '%';

    if (!inSweep && !continueAfter) {
      stop();
      return;
    }
    if (!inSweep && continueAfter) {
      statusText.textContent = `Holding at ${params.endFreq.toFixed(0)} Hz`;
      progressBar.style.width = '100%';
    }
    rafId = requestAnimationFrame(tick);
  }

  function validateInputs() {
    const startFreq = parseFloat(startFreqEl.value);
    const endFreq = parseFloat(endFreqEl.value);
    const duration = parseFloat(durationEl.value);

    if (!isFinite(startFreq) || startFreq <= 0) { alert('Start frequency must be > 0'); return null; }
    if (!isFinite(endFreq) || endFreq <= 0) { alert('End frequency must be > 0'); return null; }
    if (!isFinite(duration) || duration <= 0) { alert('Duration must be > 0'); return null; }

    return {
      startFreq,
      endFreq,
      duration,
      waveform: waveformEl.value,
      sweepType: sweepTypeEl.value,
      startVol: parseFloat(startVolEl.value),
      endVol: parseFloat(endVolEl.value),
    };
  }

  function play() {
    stop(); // clean any prior run

    const p = validateInputs();
    if (!p) return;

    params = p;
    sweepDuration = p.duration;
    continueAfter = continueAfterEl.checked;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    oscillator = audioCtx.createOscillator();
    oscillator.type = p.waveform;

    gainNode = audioCtx.createGain();

    const now = audioCtx.currentTime;
    startTime = now;

    // Frequency automation
    oscillator.frequency.setValueAtTime(p.startFreq, now);
    if (p.sweepType === 'exponential') {
      // exponentialRampToValueAtTime requires positive values
      oscillator.frequency.exponentialRampToValueAtTime(
        Math.max(0.0001, p.endFreq),
        now + p.duration
      );
    } else {
      oscillator.frequency.linearRampToValueAtTime(p.endFreq, now + p.duration);
    }

    // Volume automation (linear ramp on gain — matches the linear 1-100 volume scale)
    const startG = volToGain(p.startVol);
    const endG = volToGain(p.endVol);
    gainNode.gain.setValueAtTime(startG, now);
    gainNode.gain.linearRampToValueAtTime(endG, now + p.duration);

    oscillator.connect(gainNode).connect(audioCtx.destination);
    oscillator.start(now);

    if (!continueAfter) {
      oscillator.stop(now + p.duration + 0.05);
    }

    playBtn.disabled = true;
    stopBtn.disabled = false;
    indicator.classList.add('active');
    statusText.textContent = `Sweeping ${p.startFreq} Hz → ${p.endFreq} Hz (${p.sweepType}, ${p.waveform})`;

    tick();
  }

  function stop() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
    if (oscillator) {
      try { oscillator.stop(); } catch (e) { /* already stopped */ }
      try { oscillator.disconnect(); } catch (e) {}
      oscillator = null;
    }
    if (gainNode) {
      try { gainNode.disconnect(); } catch (e) {}
      gainNode = null;
    }
    if (audioCtx) {
      audioCtx.close().catch(() => {});
      audioCtx = null;
    }
    playBtn.disabled = false;
    stopBtn.disabled = true;
    indicator.classList.remove('active');
    statusText.textContent = 'Ready';
    progressBar.style.width = '0%';
    curFreqEl.textContent = '0';
    curTimeEl.textContent = '0.0';
    curVolEl.textContent = '0';
  }

  async function renderOffline(p) {
    const sampleRate = 44100;
    const length = Math.ceil(sampleRate * p.duration);
    const ctx = new (window.OfflineAudioContext || window.webkitOfflineAudioContext)(1, length, sampleRate);

    const osc = ctx.createOscillator();
    osc.type = p.waveform;
    const gain = ctx.createGain();

    osc.frequency.setValueAtTime(p.startFreq, 0);
    if (p.sweepType === 'exponential') {
      osc.frequency.exponentialRampToValueAtTime(Math.max(0.0001, p.endFreq), p.duration);
    } else {
      osc.frequency.linearRampToValueAtTime(p.endFreq, p.duration);
    }

    gain.gain.setValueAtTime(volToGain(p.startVol), 0);
    gain.gain.linearRampToValueAtTime(volToGain(p.endVol), p.duration);

    osc.connect(gain).connect(ctx.destination);
    osc.start(0);
    osc.stop(p.duration);

    return await ctx.startRendering();
  }

  function audioBufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const numSamples = buffer.length;
    const bytesPerSample = 2; // 16-bit PCM
    const dataSize = numSamples * numChannels * bytesPerSample;
    const bufferSize = 44 + dataSize;

    const ab = new ArrayBuffer(bufferSize);
    const view = new DataView(ab);

    const writeStr = (offset, s) => { for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i)); };

    writeStr(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeStr(8, 'WAVE');
    writeStr(12, 'fmt ');
    view.setUint32(16, 16, true);          // fmt chunk size
    view.setUint16(20, 1, true);           // PCM format
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * numChannels * bytesPerSample, true); // byte rate
    view.setUint16(32, numChannels * bytesPerSample, true);              // block align
    view.setUint16(34, 16, true);          // bits per sample
    writeStr(36, 'data');
    view.setUint32(40, dataSize, true);

    const channels = [];
    for (let c = 0; c < numChannels; c++) channels.push(buffer.getChannelData(c));

    let offset = 44;
    for (let i = 0; i < numSamples; i++) {
      for (let c = 0; c < numChannels; c++) {
        let sample = Math.max(-1, Math.min(1, channels[c][i]));
        view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
        offset += 2;
      }
    }
    return new Blob([ab], { type: 'audio/wav' });
  }

  function floatToInt16(float32) {
    const out = new Int16Array(float32.length);
    for (let i = 0; i < float32.length; i++) {
      const s = Math.max(-1, Math.min(1, float32[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
    }
    return out;
  }

  function audioBufferToMp3(buffer, kbps = 128) {
    if (typeof lamejs === 'undefined') {
      throw new Error('MP3 encoder (lamejs) failed to load. Check your internet connection on first use.');
    }
    const sampleRate = buffer.sampleRate;
    const samples = floatToInt16(buffer.getChannelData(0));
    const encoder = new lamejs.Mp3Encoder(1, sampleRate, kbps);

    const blockSize = 1152;
    const mp3Data = [];
    for (let i = 0; i < samples.length; i += blockSize) {
      const chunk = samples.subarray(i, i + blockSize);
      const buf = encoder.encodeBuffer(chunk);
      if (buf.length > 0) mp3Data.push(buf);
    }
    const end = encoder.flush();
    if (end.length > 0) mp3Data.push(end);

    return new Blob(mp3Data, { type: 'audio/mpeg' });
  }

  function triggerDownload(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  async function downloadAs(format) {
    const p = validateInputs();
    if (!p) return;

    const btn = format === 'mp3' ? downloadMp3Btn : downloadBtn;
    const originalText = btn.textContent;
    [downloadBtn, downloadMp3Btn].forEach(b => b.disabled = true);
    btn.textContent = '⏳ Rendering…';
    try {
      const rendered = await renderOffline(p);
      const base = `sweep_${p.startFreq}-${p.endFreq}Hz_${p.duration}s_${p.waveform}_${p.sweepType}`;
      let blob, fname;
      if (format === 'mp3') {
        blob = audioBufferToMp3(rendered, 128);
        fname = `${base}.mp3`;
      } else {
        blob = audioBufferToWav(rendered);
        fname = `${base}.wav`;
      }
      triggerDownload(blob, fname);
      statusText.textContent = `Saved ${fname}`;
    } catch (e) {
      console.error(e);
      alert('Render failed: ' + e.message);
    } finally {
      [downloadBtn, downloadMp3Btn].forEach(b => b.disabled = false);
      btn.textContent = originalText;
    }
  }

  const downloadBtn = $('downloadBtn');
  const downloadMp3Btn = $('downloadMp3Btn');

  playBtn.addEventListener('click', play);
  stopBtn.addEventListener('click', stop);
  downloadBtn.addEventListener('click', () => downloadAs('wav'));
  downloadMp3Btn.addEventListener('click', () => downloadAs('mp3'));

  // Spacebar toggle
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
      e.preventDefault();
      if (playBtn.disabled) stop(); else play();
    }
  });
})();
</script>
</body>
</html>
